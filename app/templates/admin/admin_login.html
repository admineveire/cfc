<!doctype html> <html lang="en"> <head> <meta charset="utf-8"/> <meta name="viewport" content="width=device-width,initial-scale=1"/> <title>Admin Login</title> <link rel="stylesheet" href="{{ url_for('static', path='css/fonts.css') }}"/> <link rel="stylesheet" href="{{ url_for('static', path='vendor/tabler/tabler.min.css') }}"/> <style> body { font-family: "InterLocal", "Segoe UI", sans-serif; } </style> </head> <body class="d-flex flex-column bg-body-tertiary"> <div class="page page-center"> <div class="container container-tight py-4"> <div class="card card-md"> <div class="card-body"> <h2 class="h2 text-center mb-2">Admin Login</h2> <p class="text-secondary text-center mb-4">Sign in to open the dashboard.</p> {% if error %} <div class="alert alert-danger" role="alert">{{ error }}</div> {% endif %} <form method="post" action="/admin/login" autocomplete="off" novalidate> <div class="mb-3"> <label class="form-label" for="username">Username</label> <input id="username" name="username" class="form-control" autocomplete="username" required/> </div> <div class="mb-3"> <label class="form-label" for="password">Password</label> <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required/> </div> <div class="form-footer"> <button type="submit" class="btn btn-primary w-100">Sign in</button> </div> </form> </div> </div> </div> </div> <script src="{{ url_for('static', path='vendor/tabler/tabler.min.js') }}"></script> </body> </html>
