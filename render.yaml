services:
  - type: web
    name: cfc
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: DB_NAME
        value: visitors
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: REDIS_REALTIME_CHANNEL
        value: fastapi_realtime_events
      - key: WEB_CONCURRENCY
        value: "2"
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: MONGO_URI
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
